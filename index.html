<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="稲沢休日予定">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="180x180" href="apple-touch-icon.png">

<title>稲沢 休日予定入力</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800;900&family=Noto+Sans+JP:wght@400;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg:#ffffff;
    --accent:#e8d830;
    --accent-glow:rgba(232,216,48,.25);
    --text:#333;
    --text-sub:#7c7c8e;
  }

  html,body{
    min-height:100%;
    font-family:'Noto Sans JP',sans-serif;
    background:#000000;
    color:var(--text);
    overflow-x:hidden;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    transition:background 1.2s ease;
  }
  html.bg-light,body.bg-light{
    background:var(--bg);
  }

  .bg-grid{
    position:fixed;inset:0;z-index:0;
    background-image:
      linear-gradient(rgba(200,200,210,.15) 1px,transparent 1px),
      linear-gradient(90deg,rgba(200,200,210,.15) 1px,transparent 1px);
    background-size:40px 40px;
    animation:gridShift 20s linear infinite;
  }
  @keyframes gridShift{
    0%{background-position:0 0}
    100%{background-position:40px 40px}
  }

  .glow-orb{
    position:fixed;border-radius:50%;filter:blur(80px);opacity:0;z-index:0;
    animation:orbFloat 8s ease-in-out infinite;
  }
  .glow-orb.a{
    width:300px;height:300px;
    background:radial-gradient(circle,var(--accent-glow),transparent 70%);
    top:-50px;right:-80px;
  }
  .glow-orb.b{
    width:250px;height:250px;
    background:radial-gradient(circle,rgba(37,99,235,.2),transparent 70%);
    bottom:-60px;left:-60px;animation-delay:3s;
  }
  @keyframes orbFloat{
    0%,100%{opacity:0;transform:scale(.8) translateY(0)}
    50%{opacity:1;transform:scale(1.1) translateY(-20px)}
  }

  .container{
    position:relative;z-index:1;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    min-height:100vh;padding:2rem 1.5rem;gap:1.2rem;
  }

  .logo-wrap{
    width:min(80vw,320px);
    height:min(80vw,320px);
    background:transparent;
    border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
    box-shadow:none;
    opacity:0;
    transform:translateY(80px);
    transition:background .8s ease, box-shadow .8s ease;
  }
  .logo-wrap.bg-ready{
    background:#2a2a32;
    box-shadow:0 4px 20px rgba(0,0,0,.3);
  }
  .logo-wrap.visible{
    animation:logoAppear 2s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes logoAppear{
    from{opacity:0;transform:translateY(80px) scale(.9)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }
  .logo-wrap::after{
    content:'';position:absolute;
    top:-50%;left:-60%;width:40%;height:200%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
    transform:skewX(-20deg);opacity:0;
    animation:logoShimmer 4s ease-in-out 7s infinite;
  }
  @keyframes logoShimmer{
    0%{left:-60%;opacity:0}
    10%{opacity:1}
    35%{left:120%;opacity:1}
    40%{opacity:0}
    100%{left:120%;opacity:0}
  }

  .dot-canvas{position:absolute;z-index:2}

  .logo-img{
    position:absolute;width:85%;height:auto;
    opacity:1;z-index:1;
    visibility:hidden;
  }

  .title{
    font-family:'M PLUS Rounded 1c',sans-serif;
    font-weight:900;font-size:clamp(1.3rem,5vw,1.8rem);
    letter-spacing:.08em;text-align:center;
    opacity:0;transform:translateY(20px);
    color:#555;
  }
  .title.show{animation:fadeUp .6s ease forwards}
  .title span{color:#2563eb}
  .subtitle{
    font-size:.85rem;color:#444;
    text-align:center;letter-spacing:.04em;
    opacity:0;transform:translateY(20px);
  }
  .subtitle.show{animation:fadeUp .6s ease .2s forwards}
  @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

  .btn-area{margin-top:.8rem;opacity:0;transform:translateY(20px)}
  .btn-area.show{animation:fadeUp .6s ease .4s forwards}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:.6rem;
    width:min(80vw,320px);padding:1rem 2rem;
    background:linear-gradient(135deg,var(--accent),#d4c428);
    color:var(--bg);
    font-family:'M PLUS Rounded 1c',sans-serif;
    font-weight:800;font-size:1.1rem;letter-spacing:.06em;
    border:none;border-radius:60px;cursor:pointer;text-decoration:none;
    position:relative;overflow:hidden;
    box-shadow:0 4px 20px var(--accent-glow);
    transition:transform .15s,box-shadow .3s;
    animation:btnPulse 2.5s ease-in-out 7s infinite;
  }
  .btn:active{transform:scale(.96)}
  @keyframes btnPulse{
    0%,100%{box-shadow:0 4px 20px var(--accent-glow),0 0 0 0 var(--accent-glow)}
    50%{box-shadow:0 4px 30px var(--accent-glow),0 0 0 8px rgba(232,216,48,.08)}
  }
  .btn::after{
    content:'';position:absolute;top:-50%;left:-60%;
    width:40%;height:200%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
    transform:skewX(-20deg);
    animation:shimmer 3s ease-in-out 7s infinite;
  }
  @keyframes shimmer{0%{left:-60%}30%{left:120%}100%{left:120%}}
  .btn-icon{font-size:1.3rem;line-height:1}

  .footer{
    position:absolute;bottom:1.5rem;
    font-size:.7rem;color:var(--text-sub);opacity:0;
  }
  .footer.show{animation:fadeUp .6s ease .6s forwards}

  .scroll-hint{
    position:absolute;bottom:.3rem;
    font-size:.6rem;color:var(--text-sub);opacity:0;
    animation:fadeUp .6s ease 1.2s forwards;
  }

  .qr-section{
    min-height:70vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#f8f8f8;padding:2rem;gap:.8rem;
    user-select:auto;
  }
  .qr-label{font-size:1rem;font-weight:700;color:#333}
  #qrCanvas{border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);background:#fff;padding:12px}
  .qr-url{font-size:.65rem;color:#888;word-break:break-all;text-align:center;max-width:280px}
  .qr-note{font-size:.75rem;color:#666;text-align:center}

  @media (orientation:landscape) and (max-height:500px){
    .container{gap:.6rem;padding:1rem}
    .logo-wrap{width:min(50vw,240px);height:min(50vw,240px)}
    .title{font-size:1.1rem}
    .subtitle{font-size:.75rem}
    .btn{padding:.7rem 1.5rem;font-size:1rem}
  }
</style>
</head>

            ictx.beginPath();
            ictx.arc(tx, ty, sp.size * 0.4, 0, Math.PI*2);
            ictx.fillStyle = 'rgba(232,216,48,' + (alpha * 0.2) + ')';
            ictx.fill();
          }

          ictx.beginPath();
          ictx.arc(cx, cy, sp.size, 0, Math.PI*2);
          ictx.fillStyle = 'rgba(232,216,48,' + alpha + ')';
          ictx.fill();
        }

        // fading center flash
        if(p < 0.3){
          var flashAlpha = (1 - p / 0.3) * 0.6;
          ictx.save();
          ictx.shadowColor = 'rgba(232,216,48,' + flashAlpha + ')';
          ictx.shadowBlur = 40;
          ictx.beginPath();
          ictx.arc(vw/2, vh/2, 3 * (1 - p/0.3), 0, Math.PI*2);
          ictx.fillStyle = 'rgba(232,216,48,' + flashAlpha + ')';
          ictx.fill();
          ictx.restore();
        }

      } else {
        // Phase C: right twist -> re-scatter -> left rotation forming border
        var p = (t - 0.5) / 0.5;

        var rectCx = rL + rW / 2;
        var rectCy = rT + rH / 2;

        if(p < 0.3){
          // C-1: right twist (clockwise), particles gather into a circle
          var pp = p / 0.3;
          var ease = easeOutQuart(pp);
          var circleRadius = Math.min(rW, rH) * 0.03;

          for(var i = 0; i < sparkParticles.length; i++){
            var sp = sparkParticles[i];
            var dx = sp.scatterX - rectCx;
            var dy = sp.scatterY - rectCy;
            var dist = Math.sqrt(dx*dx + dy*dy);
            var angle = Math.atan2(dy, dx);
            // twist right and converge to circle
            var twistAngle = angle + ease * Math.PI * 0.8;
            // target: filled circle with dense center
            var circleAngle = Math.random() * Math.PI * 2;
            var targetDist = Math.pow(Math.random(), 0.3) * circleRadius;
            var targetX = rectCx + Math.cos(circleAngle) * targetDist;
            var targetY = rectCy + Math.sin(circleAngle) * targetDist;
            // current spinning position
            var spinX = rectCx + Math.cos(twistAngle) * dist * (1 - ease * 0.7);
            var spinY = rectCy + Math.sin(twistAngle) * dist * (1 - ease * 0.7);
            // blend toward circle
            var cx = spinX + (targetX - spinX) * ease;
            var cy = spinY + (targetY - spinY) * ease;

            ictx.beginPath();
            ictx.arc(cx, cy, sp.size, 0, Math.PI*2);
            ictx.fillStyle = 'rgba(232,216,48,0.8)';
            ictx.fill();
          }

        } else if(p < 0.42){
          // C-2: re-scatter from circle outward
          var pp = (p - 0.3) / 0.12;
          var ease = easeOutQuart(pp);
          var circleRadius = Math.min(rW, rH) * 0.03;

          for(var i = 0; i < sparkParticles.length; i++){
            var sp = sparkParticles[i];
            // circle position (end of C-1)
            var circleAngle = (i / sparkParticles.length) * Math.PI * 2;
            var circDist = Math.pow(Math.random(), 0.3) * circleRadius;
            var circX = rectCx + Math.cos(circleAngle) * circDist;
            var circY = rectCy + Math.sin(circleAngle) * circDist;
            // scatter outward
            var scatterDist = circleRadius + ease * Math.max(vw, vh) * 0.25;
            sp._reX = rectCx + Math.cos(circleAngle) * scatterDist;
            sp._reY = rectCy + Math.sin(circleAngle) * scatterDist;
            var cx = circX + (sp._reX - circX) * ease;
            var cy = circY + (sp._reY - circY) * ease;

            ictx.beginPath();
            ictx.arc(cx, cy, sp.size, 0, Math.PI*2);
            ictx.fillStyle = 'rgba(232,216,48,0.6)';
            ictx.fill();
          }

        } else {
          // C-3: left rotation, gradually collecting into border while spinning
          var pp = (p - 0.42) / 0.58;
          var leftRotations = 3;
          var rotAngle = -pp * Math.PI * 2 * leftRotations;
          // settle easing: very gradual
          var settle = pp * pp; // quadratic - slow start

          for(var i = 0; i < sparkParticles.length; i++){
            var sp = sparkParticles[i];
            // re-scattered position (if not computed, fallback)
            var reX = sp._reX || sp.scatterX;
            var reY = sp._reY || sp.scatterY;

            // border target rotated by current spin angle
            var bdx = sp.borderX - rectCx;
            var bdy = sp.borderY - rectCy;
            var rotBX = rectCx + bdx * Math.cos(rotAngle) - bdy * Math.sin(rotAngle);
            var rotBY = rectCy + bdx * Math.sin(rotAngle) + bdy * Math.cos(rotAngle);

            // also rotate the re-scatter position
            var rdx = reX - rectCx;
            var rdy = reY - rectCy;
            var rotRX = rectCx + rdx * Math.cos(rotAngle) - rdy * Math.sin(rotAngle);
            var rotRY = rectCy + rdx * Math.sin(rotAngle) + rdy * Math.cos(rotAngle);

            // blend from spinning re-scatter to spinning border
            var cx = rotRX + (rotBX - rotRX) * settle;
            var cy = rotRY + (rotBY - rotRY) * settle;
            var alpha = 0.5 + settle * 0.5;

            ictx.beginPath();
            ictx.arc(cx, cy, sp.size, 0, Math.PI*2);
            ictx.fillStyle = 'rgba(232,216,48,' + alpha + ')';
            ictx.fill();
          }
        }

        // no separate border line - the dots form the border naturally
      }

      if(t >= 1){
        introPhase = 'hold';
        introStart = ts;
      }
      requestAnimationFrame(introAnimate);

    } else if(introPhase === 'hold'){
      if(el > introHold){
        introPhase = 'reveal';
        introStart = ts;
      }
      requestAnimationFrame(introAnimate);

    } else if(introPhase === 'reveal'){
      var t = el / introReveal;
      if(t > 1) t = 1;

      ictx.clearRect(0,0,vw,vh);

      // draw white expanding outward from the border, but keep rectangle dark
      // strategy: fill white, then draw dark rounded rect
      var expandPx = t * Math.max(vw, vh);

      ictx.fillStyle = '#ffffff';
      ictx.fillRect(0, 0, vw, vh);

      // dark rounded rectangle (the wrap area) - stays black
      ictx.beginPath();
      ictx.moveTo(rL + bR, rT);
      ictx.lineTo(rL + rW - bR, rT);
      ictx.arcTo(rL + rW, rT, rL + rW, rT + bR, bR);
      ictx.lineTo(rL + rW, rT + rH - bR);
      ictx.arcTo(rL + rW, rT + rH, rL + rW - bR, rT + rH, bR);
      ictx.lineTo(rL + bR, rT + rH);
      ictx.arcTo(rL, rT + rH, rL, rT + rH - bR, bR);
      ictx.lineTo(rL, rT + bR);
      ictx.arcTo(rL, rT, rL + bR, rT, bR);
      ictx.closePath();
      ictx.fillStyle = '#2a2a32';
      ictx.fill();

      // border glow on rectangle
      var glowAlpha = 0.5 * (1 - t);
      ictx.strokeStyle = 'rgba(232,216,48,' + glowAlpha + ')';
      ictx.lineWidth = 2;
      ictx.stroke();

      // mask: the area not yet revealed stays black
      // reveal grows from rectangle outward
      if(t < 1){
        // clip outside the expanded region
        var margin = expandPx;
        ictx.save();
        // draw black outside the expanded rect
        ictx.beginPath();
        ictx.rect(0, 0, vw, vh);
        // expanded rounded rect (subtract)
        var eL = rL - margin, eT = rT - margin, eW = rW + margin*2, eH = rH + margin*2, eR = bR + margin;
        ictx.moveTo(eL + eR, eT);
        ictx.lineTo(eL + eW - eR, eT);
        ictx.arcTo(eL + eW, eT, eL + eW, eT + eR, eR);
        ictx.lineTo(eL + eW, eT + eH - eR);
        ictx.arcTo(eL + eW, eT + eH, eL + eW - eR, eT + eH, eR);
        ictx.lineTo(eL + eR, eT + eH);
        ictx.arcTo(eL, eT + eH, eL, eT + eH - eR, eR);
        ictx.lineTo(eL, eT + eR);
        ictx.arcTo(eL, eT, eL + eR, eT, eR);
        ictx.closePath();
        ictx.clip('evenodd');
        ictx.fillStyle = '#000000';
        ictx.fillRect(0, 0, vw, vh);
        ictx.restore();
      }

      if(t >= 1){
        // done - switch to real page seamlessly
        document.documentElement.classList.add('bg-light');
        document.body.classList.add('bg-light');
        wrap.classList.add('bg-ready');
        // show wrap at exact final position (no CSS animation)
        wrap.style.opacity = '1';
        wrap.style.transform = 'none';

        introCanvas.style.transition = 'opacity 0.4s';
        introCanvas.style.opacity = '0';
        setTimeout(function(){
          introCanvas.style.display = 'none';
          startTime = null;
          requestAnimationFrame(animate);
        }, 400);
      } else {
        requestAnimationFrame(introAnimate);
      }
    }
  }

  setTimeout(function(){ requestAnimationFrame(introAnimate); }, 200);
  } // end startIntro

  function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }
  function easeOutBack(t){ var c = 1.2; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); }

  function animate(ts){
    if(!startTime) startTime = ts;
    var elapsed = ts - startTime;

    if(phase === 'slide'){
      var t = elapsed / slideDur;
      if(t > 1) t = 1;

      logoImg.style.visibility = 'visible';
      canvas.style.display = 'none';

      // Custom bounce easing: slide from left(-300%) to center(-50%), overshoot right, bounce back
      // Keyframes: 0->0.5: -300% to -35% (overshoot right by 15%)
      //            0.5->0.75: -35% to -55% (bounce left past center)
      //            0.75->1.0: -55% to -50% (settle at center)
      var tx;
      if(t < 0.5){
        // slide in from left, ease out to overshoot
        var p = t / 0.5;
        var ease = 1 - Math.pow(1 - p, 3); // easeOutCubic
        tx = -300 + (300 - 35) * ease; // -300 -> -35
      } else if(t < 0.75){
        // bounce back left past center
        var p = (t - 0.5) / 0.25;
        var ease = 1 - Math.pow(1 - p, 2); // easeOutQuad
        tx = -35 + (-55 - (-35)) * ease; // -35 -> -55
      } else {
        // settle to center
        var p = (t - 0.75) / 0.25;
        var ease = 1 - Math.pow(1 - p, 2);
        tx = -55 + (-50 - (-55)) * ease; // -55 -> -50
      }

      // subtle scale effect during overshoot
      var sc = 1;
      if(t >= 0.4 && t < 0.6){
        var bp = (t - 0.4) / 0.2;
        sc = 1 + 0.03 * Math.sin(bp * Math.PI);
      }

      logoImg.style.transform = 'translateX(' + tx + '%) scale(' + sc + ')';

      if(t >= 1){
        phase = 'done';
        logoImg.style.transform = 'translateX(-50%) scale(1)';

        // タップでリロード
        wrap.addEventListener('click', function(){ location.reload(); });

        document.getElementById('title').classList.add('show');
        document.getElementById('btnArea').classList.add('show');
        document.getElementById('footer').classList.add('show');
      }
      requestAnimationFrame(animate);
    }
  }
})();
